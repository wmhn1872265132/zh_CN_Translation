name: Pull Request to NVDA

on:
  push:
    branches:
      - "Uploads"
    paths:
      - 'Translation/miscDeps/*'

jobs:
  Pull-Request-To-NVDA:
    name: Pull Request to NVDA
    if: ${{ vars.Run_NVDA_Translations_Workflow }}
    runs-on: ubuntu-latest
    env:
      BaseOwner: nvaccess
      HeadOwner: ${{ github.repository_owner }}
      GH_TOKEN: ${{ secrets.PULLREQUESTTONVDA }}
    steps:
      - name: Checkout ${{ github.repository }} repository
        uses: actions/checkout@v6
      - name: Checkout NVDA repository
        uses: actions/checkout@v6
        with:
          repository: nvaccess/nvda.git
          token: ${{ secrets.PULLREQUESTTONVDA }}
          fetch-depth: 0
          ref: beta
          path: ${{ github.workspace }}/Tools/NVDA
      - name: Processing Files
        id: processing_files
        shell: bash
        env:
          miscDepsPath: ${{ github.workspace }}/Translation/miscDeps
          ZHCNPath: ${{ github.workspace }}/Tools/NVDA/source/locale/zh_CN
        run: |
          ./.github/Scripts/processing_miscDeps_files.sh
      - name: Determine branch name
        if: steps.processing_files.outputs.changes_exist == 'true'
        run: |
          shopt -s nocasematch
          if [[ "$BaseOwner" == "$HeadOwner" ]]; then
            echo "BRANCH_NAME=PullRequestToNVDA" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=$HeadOwner:PullRequestToNVDA" >> $GITHUB_ENV
          fi
      - name: Check for existing pull request
        if: steps.processing_files.outputs.changes_exist == 'true'
        id: check_pr
        run: |
          PR_NUMBER=$(gh pr list \
            --repo "${{ env.BaseOwner }}/nvda" \
            --state open \
            --head "$BRANCH_NAME" \
            --base beta \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ]; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "Existing pull request found: https://github.com/${{ env.BaseOwner }}/nvda/pull/$PR_NUMBER"
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "No existing pull request found"
          fi
      - name: Render template
        if: steps.processing_files.outputs.changes_exist == 'true' && steps.check_pr.outputs.pr_exists != 'true'
        id: template
        uses: chuhlomin/render-template@v1
        with:
          template: ${{ github.workspace }}/.github/PullRequestToNVDA_PR_Template.md
          vars: |
            Changes: ${{ env.PRTitle }}
            Owner: ${{ env.HeadOwner }}
            Commit: ${{ github.sha }}
      - name: Create pull request
        if: steps.processing_files.outputs.changes_exist == 'true' && steps.check_pr.outputs.pr_exists != 'true'
        run: |
          echo "Creating new pull request..."
          PR_URL=$(gh pr create \
            --repo "${{ env.BaseOwner }}/nvda" \
            --head "$BRANCH_NAME" \
            --head "${{ env.HeadOwner }}:PullRequestToNVDA" \
            --base beta \
            --body "${{ steps.template.outputs.result }}" \
            --draft)          
          echo "Created draft pull request: $PR_URL"
